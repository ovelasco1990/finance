<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo el historial · Finanzas</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>

<!-- data-periodo="true": la timeline respeta el mes seleccionado -->
<body data-pagina="timeline" data-titulo="Todo el historial" data-periodo="true">

  <main class="contenido">
    <div class="pagina">

      <!-- Aviso: vista de solo lectura -->
      <p class="text-suave small mb-3">
        <i class="bi bi-eye me-1"></i>
        Vista de solo lectura que reúne ingresos, gastos y ahorro del mes seleccionado.
        La edición se hace en cada apartado.
      </p>

      <!-- Filtro por tipo de origen -->
      <div class="glass p-3 mb-4 animate__animated animate__fadeIn">
        <div class="d-flex align-items-center gap-3 flex-wrap">
          <span class="text-suave small"><i class="bi bi-funnel me-1"></i>Filtrar:</span>
          <div class="filtros-pill" id="filtros-tipo">
            <input type="radio" class="btn-check" name="f-tipo" id="f-todos" value="" checked>
            <label class="pill-todo" for="f-todos"><i class="bi bi-grid me-1"></i>Todo</label>
            <input type="radio" class="btn-check" name="f-tipo" id="f-ingreso" value="ingreso">
            <label class="pill-ingreso" for="f-ingreso"><i class="bi bi-arrow-down-circle me-1"></i>Ingresos</label>
            <input type="radio" class="btn-check" name="f-tipo" id="f-gasto" value="gasto">
            <label class="pill-gasto" for="f-gasto"><i class="bi bi-arrow-up-circle me-1"></i>Gastos</label>
            <input type="radio" class="btn-check" name="f-tipo" id="f-ahorro" value="ahorro">
            <label class="pill-ahorro" for="f-ahorro"><i class="bi bi-piggy-bank me-1"></i>Ahorro</label>
          </div>
        </div>
      </div>

      <!-- Timeline unificada -->
      <div class="glass p-3 p-md-4 animate__animated animate__fadeIn">
        <div id="timeline"><!-- lo llena timeline.js --></div>
      </div>

    </div><!-- /.pagina -->
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/timeline.js"></script>
</body>
</html>
