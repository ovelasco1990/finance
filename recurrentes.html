<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recurrentes · Finanzas</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>

<!-- data-periodo="true": el botón "Generar" crea los pendientes del mes elegido -->
<body data-pagina="recurrentes" data-titulo="Recurrentes" data-periodo="true">

  <main class="contenido">
    <div class="pagina">

      <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
        <button class="btn btn-outline-secondary" id="btn-aplicar">
          <i class="bi bi-hourglass-split me-1"></i> <span id="txt-aplicar">Generar pendientes de este mes</span>
        </button>
        <button class="btn btn-acento" id="btn-nuevo">
          <i class="bi bi-plus-lg me-1"></i> Nuevo recurrente
        </button>
      </div>

      <div class="glass p-3 p-md-4 animate__animated animate__fadeIn">
        <div class="table-responsive">
          <table class="table align-middle mb-0">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Tipo</th>
                <th>Categoría</th>
                <th>Frecuencia</th>
                <th class="text-end">Monto</th>
                <th>Estado</th>
                <th class="text-end">Acciones</th>
              </tr>
            </thead>
            <tbody id="tabla-recurrentes"><!-- lo llena recurrentes.js --></tbody>
          </table>
        </div>
        <div id="recurrentes-vacio" class="estado-vacio d-none">
          <i class="bi bi-arrow-repeat"></i>
          Aún no tienes movimientos recurrentes.
        </div>
      </div>

    </div><!-- /.pagina -->
  </main>

  <!-- ============ MODAL: FORMULARIO DE RECURRENTE ============ -->
  <div class="modal fade" id="modal-recurrente" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content glass animate__animated animate__fadeInDown animate__faster">
        <form id="form-recurrente" novalidate>
          <div class="modal-header">
            <h5 class="modal-title" id="titulo-modal">Nuevo recurrente</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="rec-id">

            <div class="mb-3">
              <label for="rec-nombre" class="form-label">Nombre</label>
              <input type="text" class="form-control" id="rec-nombre" maxlength="40" placeholder="Ej. Netflix, Sueldo…">
              <div class="invalid-feedback">El nombre es obligatorio.</div>
            </div>

            <div class="mb-3">
              <label class="form-label">Tipo</label>
              <div class="selector-tipo">
                <input type="radio" class="btn-check" name="rec-tipo" id="rec-ingreso" value="ingreso">
                <label class="opcion-tipo opcion-ingreso" for="rec-ingreso"><i class="bi bi-arrow-down-circle"></i> Ingreso</label>
                <input type="radio" class="btn-check" name="rec-tipo" id="rec-gasto" value="gasto" checked>
                <label class="opcion-tipo opcion-gasto" for="rec-gasto"><i class="bi bi-arrow-up-circle"></i> Gasto</label>
              </div>
            </div>

            <div class="row g-3">
              <div class="col-12 col-sm-6">
                <label for="rec-monto" class="form-label">Monto</label>
                <input type="number" step="0.01" min="0.01" class="form-control" id="rec-monto" placeholder="0.00">
                <div class="invalid-feedback">Monto mayor a 0.</div>
              </div>
              <div class="col-12 col-sm-6">
                <label for="rec-categoria" class="form-label">Categoría</label>
                <select id="rec-categoria" class="form-select">
                  <option value="">Selecciona…</option>
                </select>
                <div class="invalid-feedback">Elige una categoría.</div>
              </div>
            </div>

            <div class="row g-3 mt-0">
              <div class="col-12 col-sm-6">
                <label for="rec-frecuencia" class="form-label">Frecuencia</label>
                <select id="rec-frecuencia" class="form-select">
                  <option value="mensual">Mensual</option>
                  <option value="semanal">Semanal</option>
                </select>
              </div>
              <div class="col-12 col-sm-6">
                <!-- Día del mes (frecuencia mensual) -->
                <div id="campo-dia-mes">
                  <label for="rec-dia-mes" class="form-label">Día del mes</label>
                  <input type="number" min="1" max="28" class="form-control" id="rec-dia-mes" value="1">
                </div>
                <!-- Día de la semana (frecuencia semanal) -->
                <div id="campo-dia-semana" class="d-none">
                  <label for="rec-dia-semana" class="form-label">Día de la semana</label>
                  <select id="rec-dia-semana" class="form-select">
                    <option value="1">Lunes</option>
                    <option value="2">Martes</option>
                    <option value="3">Miércoles</option>
                    <option value="4">Jueves</option>
                    <option value="5">Viernes</option>
                    <option value="6">Sábado</option>
                    <option value="0">Domingo</option>
                  </select>
                </div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-acento"><i class="bi bi-check-lg me-1"></i>Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/notificaciones.js"></script>
  <script src="js/recurrentes.js"></script>
</body>
</html>
