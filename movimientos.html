<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movimientos · Finanzas</title>

  <!-- Recursos por CDN (idénticos en todas las páginas) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>

<body data-pagina="movimientos" data-titulo="Movimientos" data-periodo="false">

  <main class="contenido">
    <div class="pagina">

      <!-- ============ BARRA DE ACCIONES + FILTROS ============ -->
      <div class="glass p-3 p-md-4 mb-4 animate__animated animate__fadeIn">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
          <h2 class="h6 mb-0"><i class="bi bi-funnel me-1"></i> Filtros</h2>
          <button class="btn btn-acento" id="btn-nuevo">
            <i class="bi bi-plus-lg me-1"></i> Nuevo movimiento
          </button>
        </div>

        <div class="row g-2">
          <div class="col-12">
            <label class="form-label small">Buscar</label>
            <input type="search" id="filtro-texto" class="form-control" placeholder="Buscar por nota o categoría…">
          </div>
          <div class="col-6 col-md-3">
            <label class="form-label small">Tipo</label>
            <select id="filtro-tipo" class="form-select">
              <option value="">Todos</option>
              <option value="ingreso">Ingresos</option>
              <option value="gasto">Gastos</option>
            </select>
          </div>
          <div class="col-6 col-md-3">
            <label class="form-label small">Categoría</label>
            <select id="filtro-categoria" class="form-select">
              <option value="">Todas</option>
            </select>
          </div>
          <div class="col-6 col-md-3">
            <label class="form-label small">Desde</label>
            <input type="date" id="filtro-desde" class="form-control">
          </div>
          <div class="col-6 col-md-3">
            <label class="form-label small">Hasta</label>
            <input type="date" id="filtro-hasta" class="form-control">
          </div>
        </div>
        <div class="text-end mt-2">
          <button class="btn btn-sm btn-outline-secondary" id="btn-limpiar">
            <i class="bi bi-x-circle me-1"></i> Limpiar filtros
          </button>
        </div>
      </div>

      <!-- ============ TABLA DE MOVIMIENTOS ============ -->
      <div class="glass p-3 p-md-4 animate__animated animate__fadeIn">
        <div class="table-responsive">
          <table class="table align-middle mb-0">
            <thead>
              <tr>
                <th class="th-sort" data-campo="fecha">Fecha <i class="bi bi-chevron-expand"></i></th>
                <th class="th-sort" data-campo="tipo">Tipo <i class="bi bi-chevron-expand"></i></th>
                <th class="th-sort" data-campo="categoria">Categoría <i class="bi bi-chevron-expand"></i></th>
                <th class="th-sort" data-campo="nota">Nota <i class="bi bi-chevron-expand"></i></th>
                <th class="th-sort text-end" data-campo="monto">Monto <i class="bi bi-chevron-expand"></i></th>
                <th class="text-end">Acciones</th>
              </tr>
            </thead>
            <tbody id="tabla-movimientos"><!-- lo llena movimientos.js --></tbody>
            <tfoot id="pie-movimientos" class="d-none">
              <tr>
                <td colspan="4" class="text-end fw-semibold">Totales (filtrado):</td>
                <td class="text-end">
                  <div class="small text-ingreso" id="total-ingresos">+ $0.00</div>
                  <div class="small text-gasto" id="total-gastos">− $0.00</div>
                  <div class="fw-bold" id="total-neto">$0.00</div>
                </td>
                <td></td>
              </tr>
            </tfoot>
          </table>
        </div>
        <div id="movimientos-vacio" class="estado-vacio d-none">
          <i class="bi bi-inbox"></i>
          No hay movimientos que coincidan con los filtros.
        </div>
      </div>

    </div><!-- /.pagina -->
  </main>

  <!-- ============ MODAL: FORMULARIO ALTA / EDICIÓN ============ -->
  <div class="modal fade" id="modal-movimiento" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content glass animate__animated animate__fadeInDown animate__faster">
        <form id="form-movimiento" novalidate>
          <div class="modal-header">
            <h5 class="modal-title" id="titulo-modal">Nuevo movimiento</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <!-- id oculto: si tiene valor, estamos editando -->
            <input type="hidden" id="mov-id">

            <div class="mb-3">
              <label class="form-label">Tipo</label>
              <div class="selector-tipo">
                <input type="radio" class="btn-check" name="mov-tipo" id="tipo-ingreso" value="ingreso" checked>
                <label class="opcion-tipo opcion-ingreso" for="tipo-ingreso"><i class="bi bi-arrow-down-circle"></i> Ingreso</label>
                <input type="radio" class="btn-check" name="mov-tipo" id="tipo-gasto" value="gasto">
                <label class="opcion-tipo opcion-gasto" for="tipo-gasto"><i class="bi bi-arrow-up-circle"></i> Gasto</label>
              </div>
            </div>

            <div class="row g-3">
              <div class="col-6">
                <label for="mov-monto" class="form-label">Monto</label>
                <input type="number" step="0.01" min="0.01" class="form-control" id="mov-monto" placeholder="0.00">
                <div class="invalid-feedback">Ingresa un monto mayor a 0.</div>
              </div>
              <div class="col-6">
                <label for="mov-fecha" class="form-label">Fecha</label>
                <input type="date" class="form-control" id="mov-fecha">
                <div class="invalid-feedback">Selecciona una fecha válida.</div>
              </div>
            </div>

            <div class="mt-3">
              <label for="mov-categoria" class="form-label">Categoría</label>
              <select id="mov-categoria" class="form-select">
                <option value="">Selecciona…</option>
              </select>
              <div class="invalid-feedback">La categoría es obligatoria.</div>
            </div>

            <div class="mt-3">
              <label for="mov-nota" class="form-label">Nota (opcional)</label>
              <input type="text" class="form-control" id="mov-nota" maxlength="120" placeholder="Ej. Despensa, gasolina…">
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-acento"><i class="bi bi-check-lg me-1"></i>Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/notificaciones.js"></script>
  <script src="js/movimientos.js"></script>
</body>
</html>
