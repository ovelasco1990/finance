<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presupuestos · Finanzas</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>

<!-- data-periodo="true": los presupuestos se miden contra el gasto del mes elegido -->
<body data-pagina="presupuestos" data-titulo="Presupuestos" data-periodo="true">

  <main class="contenido">
    <div class="pagina">

      <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
        <p class="text-suave mb-0 small">
          <i class="bi bi-info-circle me-1"></i>
          El progreso se calcula con los gastos del mes seleccionado en la barra superior.
        </p>
        <button class="btn btn-acento" id="btn-nuevo">
          <i class="bi bi-plus-lg me-1"></i> Nuevo presupuesto
        </button>
      </div>

      <div class="row g-3" id="lista-presupuestos"><!-- lo llena presupuestos.js --></div>

      <div id="presupuestos-vacio" class="glass p-4 estado-vacio d-none">
        <i class="bi bi-wallet2"></i>
        Aún no has definido presupuestos. Crea uno para controlar tus gastos por categoría.
      </div>

    </div><!-- /.pagina -->
  </main>

  <!-- ============ MODAL: FORMULARIO DE PRESUPUESTO ============ -->
  <div class="modal fade" id="modal-presupuesto" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content glass animate__animated animate__fadeInDown animate__faster">
        <form id="form-presupuesto" novalidate>
          <div class="modal-header">
            <h5 class="modal-title" id="titulo-modal">Nuevo presupuesto</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="pre-id">

            <div class="mb-3">
              <label for="pre-categoria" class="form-label">Categoría de gasto</label>
              <select id="pre-categoria" class="form-select">
                <option value="">Selecciona…</option>
              </select>
              <div class="invalid-feedback">Selecciona una categoría.</div>
            </div>

            <div class="mb-2">
              <label for="pre-limite" class="form-label">Límite mensual</label>
              <input type="number" step="0.01" min="0.01" class="form-control" id="pre-limite" placeholder="0.00">
              <div class="invalid-feedback">Ingresa un límite mayor a 0.</div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-acento"><i class="bi bi-check-lg me-1"></i>Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/presupuestos.js"></script>
</body>
</html>
