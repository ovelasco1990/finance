<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard · Finanzas</title>

  <!-- ============ RECURSOS POR CDN ============ -->
  <!-- Bootstrap 5 (layout y componentes) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons (iconografía) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Animate.css (animaciones sutiles de entrada) -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
  <!-- Google Fonts: Inter (tipografía) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- ============ ESTILOS PROPIOS (ruta relativa para XAMPP/PHP) ============ -->
  <link href="css/styles.css" rel="stylesheet">
</head>

<!-- data-pagina: enlace activo · data-titulo: título navbar · data-periodo: usa selector de mes -->
<body data-pagina="dashboard" data-titulo="Dashboard" data-periodo="true">

  <!-- app.js inyecta aquí el sidebar. El contenido de la página va dentro de .contenido -->
  <main class="contenido">
    <!-- app.js inyecta aquí la navbar superior -->

    <div class="pagina">

      <!-- ============ TARJETAS DE RESUMEN ============ -->
      <div class="row g-3 mb-4">
        <div class="col-6 col-xl-3">
          <div class="glass tarjeta-resumen h-100 animate__animated animate__fadeInUp">
            <div class="d-flex justify-content-between align-items-start">
              <div>
                <div class="etiqueta">Balance total</div>
                <div class="valor" id="resumen-balance">$0.00</div>
                <div class="small mt-1" id="resumen-balance-mes">&nbsp;</div>
              </div>
              <span class="icono icono-acento"><i class="bi bi-wallet2"></i></span>
            </div>
          </div>
        </div>
        <div class="col-6 col-xl-3">
          <div class="glass tarjeta-resumen h-100 animate__animated animate__fadeInUp" style="animation-delay:.05s">
            <div class="d-flex justify-content-between align-items-start">
              <div>
                <div class="etiqueta">Ingresos del mes</div>
                <div class="valor text-ingreso" id="resumen-ingresos">$0.00</div>
              </div>
              <span class="icono icono-ingreso"><i class="bi bi-arrow-down-circle"></i></span>
            </div>
          </div>
        </div>
        <div class="col-6 col-xl-3">
          <div class="glass tarjeta-resumen h-100 animate__animated animate__fadeInUp" style="animation-delay:.1s">
            <div class="d-flex justify-content-between align-items-start">
              <div>
                <div class="etiqueta">Gastos del mes</div>
                <div class="valor text-gasto" id="resumen-gastos">$0.00</div>
              </div>
              <span class="icono icono-gasto"><i class="bi bi-arrow-up-circle"></i></span>
            </div>
          </div>
        </div>
        <div class="col-6 col-xl-3">
          <div class="glass tarjeta-resumen h-100 animate__animated animate__fadeInUp" style="animation-delay:.15s">
            <div class="d-flex justify-content-between align-items-start">
              <div>
                <div class="etiqueta">Total ahorrado</div>
                <div class="valor text-ahorro" id="resumen-ahorro">$0.00</div>
              </div>
              <span class="icono icono-ahorro"><i class="bi bi-piggy-bank"></i></span>
            </div>
          </div>
        </div>
      </div>

      <!-- ============ GRÁFICAS ============ -->
      <div class="row g-3 mb-4">
        <!-- Dona: gastos por categoría -->
        <div class="col-12 col-lg-5">
          <div class="glass p-4 h-100 animate__animated animate__fadeIn">
            <h2 class="h6 mb-3">Gastos por categoría</h2>
            <div id="cont-dona" style="position:relative;height:280px">
              <canvas id="grafica-dona"></canvas>
            </div>
            <!-- Estado vacío (se muestra si no hay gastos en el mes) -->
            <div id="dona-vacio" class="estado-vacio d-none">
              <i class="bi bi-pie-chart"></i>
              No hay gastos en este mes.
            </div>
          </div>
        </div>
        <!-- Barras: ingresos vs gastos por mes -->
        <div class="col-12 col-lg-7">
          <div class="glass p-4 h-100 animate__animated animate__fadeIn">
            <h2 class="h6 mb-3">Ingresos vs gastos (últimos 6 meses)</h2>
            <div style="position:relative;height:280px">
              <canvas id="grafica-barras"></canvas>
            </div>
          </div>
        </div>
      </div>

      <!-- ============ ÚLTIMOS MOVIMIENTOS ============ -->
      <div class="glass p-4 animate__animated animate__fadeIn">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2 class="h6 mb-0">Últimos movimientos</h2>
          <a href="movimientos.html" class="text-decoration-none small">Ver todos <i class="bi bi-arrow-right"></i></a>
        </div>
        <div id="ultimos-movimientos"><!-- lo llena dashboard.js --></div>
      </div>

    </div><!-- /.pagina -->
  </main>

  <!-- ============ SCRIPTS ============ -->
  <!-- Bootstrap (Toasts/Modales) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Chart.js (gráficas) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <!-- Orden importante: primero la capa de datos, luego lo común, luego la página -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
