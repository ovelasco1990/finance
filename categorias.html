<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorías · Finanzas</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>

<body data-pagina="categorias" data-titulo="Categorías" data-periodo="false">

  <main class="contenido">
    <div class="pagina">

      <div class="d-flex justify-content-end mb-3">
        <button class="btn btn-acento" id="btn-nueva">
          <i class="bi bi-plus-lg me-1"></i> Nueva categoría
        </button>
      </div>

      <!-- ============ CATEGORÍAS DE INGRESO ============ -->
      <div class="glass p-3 p-md-4 mb-4 animate__animated animate__fadeIn">
        <h2 class="h6 mb-3 text-ingreso"><i class="bi bi-arrow-down-circle me-1"></i> Ingresos</h2>
        <div class="row g-2" id="lista-ingresos"></div>
        <div id="vacio-ingresos" class="estado-vacio d-none">
          <i class="bi bi-tags"></i> Aún no hay categorías de ingreso.
        </div>
      </div>

      <!-- ============ CATEGORÍAS DE GASTO ============ -->
      <div class="glass p-3 p-md-4 animate__animated animate__fadeIn">
        <h2 class="h6 mb-3 text-gasto"><i class="bi bi-arrow-up-circle me-1"></i> Gastos</h2>
        <div class="row g-2" id="lista-gastos"></div>
        <div id="vacio-gastos" class="estado-vacio d-none">
          <i class="bi bi-tags"></i> Aún no hay categorías de gasto.
        </div>
      </div>

    </div><!-- /.pagina -->
  </main>

  <!-- ============ MODAL: FORMULARIO DE CATEGORÍA ============ -->
  <div class="modal fade" id="modal-categoria" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content glass animate__animated animate__fadeInDown animate__faster">
        <form id="form-categoria" novalidate>
          <div class="modal-header">
            <h5 class="modal-title" id="titulo-modal">Nueva categoría</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="cat-id">
            <input type="hidden" id="cat-icono"><!-- guarda la clase bi-... elegida -->

            <!-- Vista previa en vivo del icono con su color -->
            <div class="text-center mb-3">
              <span class="icono" id="cat-preview" style="width:64px;height:64px;font-size:1.9rem;margin:auto">
                <i class="bi bi-tag"></i>
              </span>
            </div>

            <div class="mb-3">
              <label for="cat-nombre" class="form-label">Nombre</label>
              <input type="text" class="form-control" id="cat-nombre" maxlength="30" placeholder="Ej. Comida">
              <div class="invalid-feedback">El nombre es obligatorio.</div>
            </div>

            <div class="row g-3 mb-3">
              <div class="col-12 col-sm-8">
                <label class="form-label">Tipo</label>
                <div class="selector-tipo">
                  <input type="radio" class="btn-check" name="cat-tipo" id="cat-ingreso" value="ingreso" checked>
                  <label class="opcion-tipo opcion-ingreso" for="cat-ingreso"><i class="bi bi-arrow-down-circle"></i> Ingreso</label>
                  <input type="radio" class="btn-check" name="cat-tipo" id="cat-gasto" value="gasto">
                  <label class="opcion-tipo opcion-gasto" for="cat-gasto"><i class="bi bi-arrow-up-circle"></i> Gasto</label>
                </div>
              </div>
              <div class="col-12 col-sm-4">
                <label for="cat-color" class="form-label">Color</label>
                <input type="color" class="form-control form-control-color w-100" id="cat-color" value="#6366f1">
              </div>
            </div>

            <label class="form-label">Icono</label>
            <div id="selector-iconos" class="d-flex flex-wrap gap-2">
              <!-- lo llena categorias.js -->
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-acento"><i class="bi bi-check-lg me-1"></i>Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/categorias.js"></script>
</body>
</html>
